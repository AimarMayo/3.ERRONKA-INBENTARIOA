<html lang="eu">
<head>
  <meta charset="UTF-8">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="estiloak.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
  <img src="img/DaatuTech.png" alt="DATUTECH logo" width="100" height="100" class="me-2">
  
</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menua">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menua">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Hasiera</a></li>
          <li class="nav-item"><a class="nav-link" href="guri buruz.html">Guri buruz</a></li>
          <li class="nav-item"><a class="nav-link" href="zerbitzuak.html">Zerbitzuak</a></li>
          <li class="nav-item"><a class="nav-link" href="kontaktua.html">Kontaktua</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Admin sarbidea</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <h1 class="text-center mb-4"><b>Administrariaren sarbidea</b></h1>
              <p class="text-center text-muted mb-4">
                Sartu zure erabiltzaile izena eta pasahitza administrazio gunera sartzeko.
              </p>

              <form id="loginFormularioa">
                <div class="mb-3">
                  <label for="erabiltzailea" class="form-label">Erabiltzaile izena</label>
                  <input type="text" class="form-control" id="erabiltzailea" required>
                </div>

                <div class="mb-3">
                  <label for="pasahitza" class="form-label">Pasahitza</label>
                  <input type="password" class="form-control" id="pasahitza" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Sartu</button>
              </form>

              <p id="loginErantzuna" class="text-danger text-center mt-3 fw-semibold"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-primary text-white text-center py-3 mt-5">
    <p class="mb-0">© 2026 Inbentario Digitala - Hezkuntza proiektua</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const loginFormularioa = document.getElementById("loginFormularioa");

    if (loginFormularioa) {
      loginFormularioa.addEventListener("submit", function(e) {
        e.preventDefault();

        const erabiltzailea = document.getElementById("erabiltzailea").value;
        const pasahitza = document.getElementById("pasahitza").value;
        const loginErantzuna = document.getElementById("loginErantzuna");

        if (erabiltzailea === "admin" && pasahitza === "1234") {
          window.location.href = "admin.html";
        } else {
          loginErantzuna.textContent = "Erabiltzaile izena edo pasahitza ez da zuzena.";
        }
      });
    }
  </script>
</body>
</html>
